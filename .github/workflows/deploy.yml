name: deploy

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: 19.x

      - name: Install deps
        run: npm install

      - name: Build project
        run: npm run build

      - name: Prepare artifacts
        uses: actions/upload-artifact@v2
        with:
          name: artifacts
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v2
        with:
          name: artifacts

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync S3
        run: |
          aws s3 sync ./artifacts ${{ secrets.AWS_BUCKET }} --delete

