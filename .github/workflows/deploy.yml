name: deploy

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: 19.x

      - name: Install deps
        run: npm install

      - name: Build project
        run: npm run build

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: arn:aws:iam::586140253651:role/OIDC_GITHUB_mr_chelyshkin_S3-deploy
          aws-region: eu-central-1

      - name: Copy files to S3
        run: |
          aws s3 cp ./dist s3://mr-chelyshkin.com --recursive

